[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:bgutil]
command=node /bgutil/server/build/main.js --port 4416
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/bgutil.log
stderr_logfile=/var/log/supervisor/bgutil.log
priority=1

[program:bot]
command=python3 -m UltraMusic
directory=/app
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/bot.log
stderr_logfile=/var/log/supervisor/bot.log
priority=2
